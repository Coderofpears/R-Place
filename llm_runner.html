<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Runner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            background: #000;
            color: #fff;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            padding: 15px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 20px;
        }
        header h1 {
            font-size: 1.5rem;
            font-weight: 400;
        }
        .upload-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 20px;
        }
        .upload-box {
            border: 2px dashed #333;
            border-radius: 10px;
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        .upload-box:hover {
            border-color: #666;
        }
        .upload-box p {
            color: #666;
            margin-top: 10px;
        }
        .btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        .btn:hover {
            background: #ddd;
        }
        .btn:disabled {
            background: #333;
            cursor: not-allowed;
        }
        .chat-section {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-section.active {
            display: flex;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
            margin-bottom: 20px;
        }
        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 8px;
            max-width: 85%;
            line-height: 1.5;
        }
        .message.user {
            background: #222;
            margin-left: auto;
        }
        .message.assistant {
            background: #111;
            border: 1px solid #333;
        }
        .message.error {
            background: #300;
            border: 1px solid #600;
        }
        .input-area {
            display: flex;
            gap: 10px;
            padding-top: 15px;
            border-top: 1px solid #333;
        }
        .input-area input {
            flex: 1;
            background: #111;
            border: 1px solid #333;
            color: #fff;
            padding: 14px 18px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }
        .input-area input:focus {
            border-color: #555;
        }
        .input-area input:disabled {
            background: #0a0a0a;
            color: #444;
        }
        .status {
            font-size: 12px;
            color: #666;
            padding: 10px 0;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #111;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 10px;
        }
        .progress-bar fill {
            height: 100%;
            background: #fff;
            transition: width 0.3s;
        }
        .model-info {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
        }
        #fileInput {
            display: none;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #333;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>LLM Runner</h1>
        </header>
        
        <div class="upload-section" id="uploadSection">
            <div class="upload-box" onclick="document.getElementById('fileInput').click()">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.5">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                </svg>
                <p>Click to upload model.json</p>
            </div>
            <input type="file" id="fileInput" accept=".json" onchange="handleFileSelect(event)">
            <div id="uploadStatus"></div>
        </div>
        
        <div class="chat-section" id="chatSection">
            <div class="status" id="statusBar">Ready</div>
            <div class="messages" id="messages"></div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)" disabled>
                <button class="btn" id="sendBtn" onclick="sendMessage()" disabled>Send</button>
            </div>
            <div class="model-info" id="modelInfo"></div>
        </div>
    </div>

    <script>
    // ========================================
    // TENSOR OPERATIONS (Vanilla JS)
    // ========================================
    
    class Tensor {
        constructor(data, shape) {
            if (Array.isArray(data) && !shape) {
                // Infer shape from data
                this.data = new Float32Array(data);
                this.shape = [data.length];
            } else {
                this.data = new Float32Array(data);
                this.shape = shape || [data.length];
            }
        }
        
        static fromArray(arr) {
            return new Tensor(arr);
        }
        
        static zeros(shape) {
            const size = shape.reduce((a, b) => a * b, 1);
            return new Tensor(new Float32Array(size), shape);
        }
        
        static ones(shape) {
            const size = shape.reduce((a, b) => a * b, 1);
            const data = new Float32Array(size).fill(1);
            return new Tensor(data, shape);
        }
        
        get size() {
            return this.data.length;
        }
        
        reshape(newShape) {
            const newSize = newShape.reduce((a, b) => a * b, 1);
            if (newSize !== this.size) {
                throw new Error(`Cannot reshape ${this.shape} to ${newShape}`);
            }
            return new Tensor(this.data.slice(), newShape);
        }
        
        transpose(axes) {
            const newShape = axes.map(i => this.shape[i]);
            const result = Tensor.zeros(newShape);
            
            const indices = new Array(this.shape.length).fill(0);
            const newIndices = new Array(this.shape.length).fill(0);
            
            const total = this.size;
            for (let i = 0; i < total; i++) {
                // Convert flat index to multi-dimensional
                let temp = i;
                for (let d = this.shape.length - 1; d >= 0; d--) {
                    indices[d] = temp % this.shape[d];
                    temp = Math.floor(temp / this.shape[d]);
                }
                
                // Apply transpose
                for (let d = 0; d < axes.length; d++) {
                    newIndices[d] = indices[axes[d]];
                }
                
                // Convert back to flat index
                let newFlat = 0;
                let stride = 1;
                for (let d = newShape.length - 1; d >= 0; d--) {
                    newFlat += newIndices[d] * stride;
                    stride *= newShape[d];
                }
                
                result.data[newFlat] = this.data[i];
            }
            
            return result;
        }
        
        slice(start, end) {
            return new Tensor(this.data.slice(start, end));
        }
    }
    
    // Matrix multiplication
    function matmul(a, b) {
        // a: [M, K], b: [K, N] -> [M, N]
        let aShape, bShape;
        
        if (a.shape.length === 1) {
            aShape = [1, a.shape[0]];
        } else {
            aShape = a.shape;
        }
        
        if (b.shape.length === 1) {
            bShape = [b.shape[0], 1];
        } else {
            bShape = b.shape;
        }
        
        if (aShape[1] !== bShape[0]) {
            throw new Error(`Matrix dimensions don't match: ${aShape} x ${bShape}`);
        }
        
        const M = aShape[0];
        const K = aShape[1];
        const N = bShape[1];
        const result = Tensor.zeros([M, N]);
        
        for (let i = 0; i < M; i++) {
            for (let j = 0; j < N; j++) {
                let sum = 0;
                for (let k = 0; k < K; k++) {
                    sum += a.data[i * K + k] * b.data[k * N + j];
                }
                result.data[i * N + j] = sum;
            }
        }
        
        // Squeeze if needed
        if (a.shape.length === 1 && b.shape.length === 1) {
            return result.data[0];
        } else if (a.shape.length === 1) {
            return new Tensor(result.data.slice(), [N]);
        } else if (b.shape.length === 1) {
            return new Tensor(result.data.slice(), [M]);
        }
        
        return result;
    }
    
    // Element-wise operations
    function add(a, b) {
        const result = new Tensor(new Float32Array(a.data.length));
        if (typeof b === 'number') {
            for (let i = 0; i < a.data.length; i++) {
                result.data[i] = a.data[i] + b;
            }
        } else {
            for (let i = 0; i < a.data.length; i++) {
                result.data[i] = a.data[i] + b.data[i];
            }
        }
        result.shape = a.shape.slice();
        return result;
    }
    
    function multiply(a, b) {
        const result = new Tensor(new Float32Array(a.data.length));
        if (typeof b === 'number') {
            for (let i = 0; i < a.data.length; i++) {
                result.data[i] = a.data[i] * b;
            }
        } else {
            for (let i = 0; i < a.data.length; i++) {
                result.data[i] = a.data[i] * b.data[i];
            }
        }
        result.shape = a.shape.slice();
        return result;
    }
    
    // Activation functions
    function relu(x) {
        const result = new Tensor(new Float32Array(x.data.length));
        for (let i = 0; i < x.data.length; i++) {
            result.data[i] = Math.max(0, x.data[i]);
        }
        result.shape = x.shape.slice();
        return result;
    }
    
    function silu(x) {
        const result = new Tensor(new Float32Array(x.data.length));
        for (let i = 0; i < x.data.length; i++) {
            const v = x.data[i];
            result.data[i] = v / (1 + Math.exp(-v));
        }
        result.shape = x.shape.slice();
        return result;
    }
    
    function softmax(x) {
        const result = new Tensor(new Float32Array(x.data.length));
        const maxVal = Math.max(...x.data);
        let sum = 0;
        
        for (let i = 0; i < x.data.length; i++) {
            const exp = Math.exp(x.data[i] - maxVal);
            result.data[i] = exp;
            sum += exp;
        }
        
        for (let i = 0; i < x.data.length; i++) {
            result.data[i] /= sum;
        }
        
        result.shape = x.shape.slice();
        return result;
    }
    
    // RMS Normalization
    function rmsNorm(x, weight, eps = 1e-5) {
        const result = new Tensor(new Float32Array(x.data.length));
        let sum = 0;
        
        for (let i = 0; i < x.data.length; i++) {
            sum += x.data[i] * x.data[i];
        }
        
        const rms = Math.sqrt(sum / x.data.length + eps);
        
        for (let i = 0; i < x.data.length; i++) {
            result.data[i] = (x.data[i] / rms) * weight.data[i];
        }
        
        result.shape = x.shape.slice();
        return result;
    }
    
    // ========================================
    // ROPE (Rotary Position Embeddings)
    // ========================================
    
    function precomputeRoPE(dim, maxLen, theta = 10000.0) {
        const freqs = [];
        for (let i = 0; i < dim; i += 2) {
            freqs.push(1.0 / Math.pow(theta, i / dim));
        }
        
        const sinTable = [];
        const cosTable = [];
        
        for (let pos = 0; pos < maxLen; pos++) {
            for (let f of freqs) {
                const angle = pos * f;
                sinTable.push(Math.sin(angle));
                cosTable.push(Math.cos(angle));
            }
        }
        
        return { sin: sinTable, cos: cosTable };
    }
    
    function applyRoPE(x, sinTable, cosTable, position, numHeads, headDim) {
        const result = new Tensor(new Float32Array(x.data.length));
        result.shape = x.shape.slice();
        
        const halfDim = headDim / 2;
        
        for (let h = 0; h < numHeads; h++) {
            const headOffset = h * headDim;
            
            for (let i = 0; i < halfDim; i++) {
                const cos = cosTable[position * halfDim + i];
                const sin = sinTable[position * halfDim + i];
                
                const idx1 = headOffset + i;
                const idx2 = headOffset + halfDim + i;
                
                const v1 = x.data[idx1];
                const v2 = x.data[idx2];
                
                result.data[idx1] = v1 * cos - v2 * sin;
                result.data[idx2] = v1 * sin + v2 * cos;
            }
        }
        
        return result;
    }
    
    // ========================================
    // TOKENIZER (BPE-style)
    // ========================================
    
    class SimpleTokenizer {
        constructor(tokenizerData) {
            this.vocab = tokenizerData.vocab || {};
            this.merges = tokenizerData.merges || [];
            this.bosTokenId = tokenizerData.bos_token_id ?? 1;
            this.eosTokenId = tokenizerData.eos_token_id ?? 2;
            this.padTokenId = tokenizerData.pad_token_id ?? 0;
            this.unkTokenId = tokenizerData.unk_token_id ?? 0;
            
            // Build reverse vocab
            this.idToToken = {};
            for (const [token, id] of Object.entries(this.vocab)) {
                this.idToToken[id] = token;
            }
            
            // Build merge rules
            this.mergeRanks = {};
            for (let i = 0; i < this.merges.length; i++) {
                this.mergeRanks[this.merges[i]] = i;
            }
        }
        
        encode(text) {
            // Simple character-level tokenization with merge rules
            let tokens = [];
            
            // Split into words
            const words = text.split(/(\s+)/).filter(w => w.length > 0);
            
            for (const word of words) {
                // Get character tokens
                let wordTokens = [];
                for (let i = 0; i < word.length; i++) {
                    const char = word[i];
                    if (this.vocab[char] !== undefined) {
                        wordTokens.push(this.vocab[char]);
                    } else {
                        // Unknown character - use UNK
                        wordTokens.push(this.unkTokenId);
                    }
                }
                
                // Apply BPE merges
                wordTokens = this.applyBPE(wordTokens);
                tokens.push(...wordTokens);
            }
            
            return tokens;
        }
        
        applyBPE(tokens) {
            // Convert token IDs back to strings for merging
            let tokenStrs = tokens.map(id => this.idToToken[id] || '');
            
            // Apply merges iteratively
            let changed = true;
            while (changed && tokenStrs.length > 1) {
                changed = false;
                let bestMerge = null;
                let bestRank = Infinity;
                
                for (let i = 0; i < tokenStrs.length - 1; i++) {
                    const pair = tokenStrs[i] + ' ' + tokenStrs[i + 1];
                    if (this.mergeRanks[pair] !== undefined && this.mergeRanks[pair] < bestRank) {
                        bestRank = this.mergeRanks[pair];
                        bestMerge = i;
                    }
                }
                
                if (bestMerge !== null) {
                    const merged = tokenStrs[bestMerge] + tokenStrs[bestMerge + 1];
                    if (this.vocab[merged] !== undefined) {
                        tokenStrs[bestMerge] = merged;
                        tokenStrs.splice(bestMerge + 1, 1);
                        changed = true;
                    }
                }
            }
            
            // Convert back to token IDs
            return tokenStrs.map(str => this.vocab[str] ?? this.unkTokenId);
        }
        
        decode(tokenIds) {
            let result = '';
            for (const id of tokenIds) {
                const token = this.idToToken[id] || '';
                result += token;
            }
            return result;
        }
    }
    
    // ========================================
    // TRANSFORMER MODEL
    // ========================================
    
    class TransformerModel {
        constructor(modelData) {
            this.config = modelData.config;
            this.weights = modelData.weights;
            this.tokenizer = new SimpleTokenizer(modelData.tokenizer);
            
            // Extract config values
            this.hiddenSize = this.config.hidden_size;
            this.numLayers = this.config.num_hidden_layers;
            this.numHeads = this.config.num_attention_heads;
            this.numKVHeads = this.config.num_key_value_heads || this.numHeads;
            this.intermediateSize = this.config.intermediate_size;
            this.vocabSize = this.config.vocab_size;
            this.maxPosition = this.config.max_position_embeddings;
            this.ropeTheta = this.config.rope_theta || 10000.0;
            this.rmsNormEps = this.config.rms_norm_eps || 1e-5;
            
            // Calculate dimensions
            this.headDim = this.hiddenSize / this.numHeads;
            
            // Precompute RoPE
            this.rope = precomputeRoPE(this.headDim, this.maxPosition, this.ropeTheta);
            
            // Load weights into tensors
            this.loadWeights();
            
            // KV cache
            this.kvCache = null;
            this.position = 0;
        }
        
        loadWeights() {
            const w = this.weights;
            const hs = this.hiddenSize;
            
            // Embedding
            this.embedTokens = w.embed_tokens ? new Tensor(w.embed_tokens, [this.vocabSize, hs]) : null;
            
            // Final norm
            this.norm = w.norm ? new Tensor(w.norm, [hs]) : Tensor.ones([hs]);
            
            // LM Head
            this.lmHead = w.lm_head ? new Tensor(w.lm_head, [hs, this.vocabSize]) : null;
            
            // Layer weights
            this.layers = [];
            for (let i = 0; i < this.numLayers; i++) {
                const layerKey = `layer_${i}`;
                const layerWeights = w[layerKey] || {};
                
                const layer = {
                    // Attention
                    qProj: layerWeights.q_proj ? new Tensor(layerWeights.q_proj, [hs, hs]) : Tensor.zeros([hs, hs]),
                    kProj: layerWeights.k_proj ? new Tensor(layerWeights.k_proj, [hs, this.numKVHeads * this.headDim]) : Tensor.zeros([hs, this.numKVHeads * this.headDim]),
                    vProj: layerWeights.v_proj ? new Tensor(layerWeights.v_proj, [hs, this.numKVHeads * this.headDim]) : Tensor.zeros([hs, this.numKVHeads * this.headDim]),
                    oProj: layerWeights.o_proj ? new Tensor(layerWeights.o_proj, [hs, hs]) : Tensor.zeros([hs, hs]),
                    
                    // MLP (using gate_proj for SwiGLU)
                    gateProj: layerWeights.gate_proj ? new Tensor(layerWeights.gate_proj, [hs, this.intermediateSize]) : Tensor.zeros([hs, this.intermediateSize]),
                    upProj: layerWeights.up_proj ? new Tensor(layerWeights.up_proj, [hs, this.intermediateSize]) : Tensor.zeros([hs, this.intermediateSize]),
                    downProj: layerWeights.down_proj ? new Tensor(layerWeights.down_proj, [this.intermediateSize, hs]) : Tensor.zeros([this.intermediateSize, hs]),
                    
                    // Layer norms
                    inputLayerNorm: layerWeights.input_layernorm ? new Tensor(layerWeights.input_layernorm, [hs]) : Tensor.ones([hs]),
                    postAttentionLayerNorm: layerWeights.post_attention_layernorm ? new Tensor(layerWeights.post_attention_layernorm, [hs]) : Tensor.ones([hs]),
                };
                
                this.layers.push(layer);
            }
        }
        
        reset() {
            this.kvCache = null;
            this.position = 0;
        }
        
        forward(inputIds) {
            const seqLen = inputIds.length;
            const hs = this.hiddenSize;
            
            // Initialize KV cache if needed
            if (this.kvCache === null || this.kvCache.length !== this.numLayers) {
                this.kvCache = [];
                for (let i = 0; i < this.numLayers; i++) {
                    this.kvCache.push({
                        keys: new Float32Array(this.maxPosition * this.numKVHeads * this.headDim),
                        values: new Float32Array(this.maxPosition * this.numKVHeads * this.headDim)
                    });
                }
            }
            
            // Get embeddings
            let hidden = new Float32Array(seqLen * hs);
            for (let i = 0; i < seqLen; i++) {
                const token = inputIds[i];
                if (this.embedTokens) {
                    for (let j = 0; j < hs; j++) {
                        hidden[i * hs + j] = this.embedTokens.data[token * hs + j];
                    }
                } else {
                    // Fallback: random-ish embedding based on token
                    for (let j = 0; j < hs; j++) {
                        hidden[i * hs + j] = Math.sin(token + j) * 0.1;
                    }
                }
            }
            
            // Process each layer
            for (let layerIdx = 0; layerIdx < this.numLayers; layerIdx++) {
                const layer = this.layers[layerIdx];
                const cache = this.kvCache[layerIdx];
                
                // RMSNorm before attention
                hidden = this.rmsNormForward(hidden, layer.inputLayerNorm);
                
                // Self-attention
                hidden = this.attentionForward(hidden, layer, cache, seqLen);
                
                // RMSNorm before MLP
                hidden = this.rmsNormForward(hidden, layer.postAttentionLayerNorm);
                
                // MLP
                hidden = this.mlpForward(hidden, layer);
            }
            
            // Final norm
            hidden = this.rmsNormForward(hidden, this.norm);
            
            // LM Head - only compute for last token
            const logits = new Float32Array(this.vocabSize);
            const lastHidden = hidden.slice((seqLen - 1) * hs, seqLen * hs);
            
            if (this.lmHead) {
                for (let v = 0; v < this.vocabSize; v++) {
                    let sum = 0;
                    for (let j = 0; j < hs; j++) {
                        sum += lastHidden[j] * this.lmHead.data[j * this.vocabSize + v];
                    }
                    logits[v] = sum;
                }
            } else {
                // Fallback: simple projection
                for (let v = 0; v < this.vocabSize; v++) {
                    logits[v] = lastHidden[v % hs] * 0.1;
                }
            }
            
            this.position += seqLen;
            
            return logits;
        }
        
        rmsNormForward(x, weight) {
            const result = new Float32Array(x.length);
            const hs = this.hiddenSize;
            const seqLen = x.length / hs;
            
            for (let s = 0; s < seqLen; s++) {
                let sum = 0;
                for (let j = 0; j < hs; j++) {
                    sum += x[s * hs + j] * x[s * hs + j];
                }
                const rms = Math.sqrt(sum / hs + this.rmsNormEps);
                
                for (let j = 0; j < hs; j++) {
                    result[s * hs + j] = (x[s * hs + j] / rms) * weight.data[j];
                }
            }
            
            return result;
        }
        
        attentionForward(x, layer, cache, seqLen) {
            const hs = this.hiddenSize;
            const numHeads = this.numHeads;
            const numKVHeads = this.numKVHeads;
            const headDim = this.headDim;
            const startPos = this.position;
            
            // Compute Q, K, V projections
            const Q = new Float32Array(seqLen * numHeads * headDim);
            const K = new Float32Array(seqLen * numKVHeads * headDim);
            const V = new Float32Array(seqLen * numKVHeads * headDim);
            
            for (let s = 0; s < seqLen; s++) {
                // Q = x @ Wq
                for (let h = 0; h < numHeads; h++) {
                    for (let d = 0; d < headDim; d++) {
                        let sum = 0;
                        for (let j = 0; j < hs; j++) {
                            sum += x[s * hs + j] * layer.qProj.data[j * hs + h * headDim + d];
                        }
                        Q[s * numHeads * headDim + h * headDim + d] = sum;
                    }
                }
                
                // K = x @ Wk
                for (let h = 0; h < numKVHeads; h++) {
                    for (let d = 0; d < headDim; d++) {
                        let sum = 0;
                        for (let j = 0; j < hs; j++) {
                            sum += x[s * hs + j] * layer.kProj.data[j * (numKVHeads * headDim) + h * headDim + d];
                        }
                        K[s * numKVHeads * headDim + h * headDim + d] = sum;
                    }
                }
                
                // V = x @ Wv
                for (let h = 0; h < numKVHeads; h++) {
                    for (let d = 0; d < headDim; d++) {
                        let sum = 0;
                        for (let j = 0; j < hs; j++) {
                            sum += x[s * hs + j] * layer.vProj.data[j * (numKVHeads * headDim) + h * headDim + d];
                        }
                        V[s * numKVHeads * headDim + h * headDim + d] = sum;
                    }
                }
            }
            
            // Apply RoPE to Q and K
            for (let s = 0; s < seqLen; s++) {
                const pos = startPos + s;
                for (let h = 0; h < numHeads; h++) {
                    const offset = s * numHeads * headDim + h * headDim;
                    for (let i = 0; i < headDim / 2; i++) {
                        const cos = this.rope.cos[pos * (headDim / 2) + i];
                        const sin = this.rope.sin[pos * (headDim / 2) + i];
                        
                        const idx1 = offset + i;
                        const idx2 = offset + headDim / 2 + i;
                        
                        const v1 = Q[idx1];
                        const v2 = Q[idx2];
                        
                        Q[idx1] = v1 * cos - v2 * sin;
                        Q[idx2] = v1 * sin + v2 * cos;
                    }
                }
                
                for (let h = 0; h < numKVHeads; h++) {
                    const offset = s * numKVHeads * headDim + h * headDim;
                    for (let i = 0; i < headDim / 2; i++) {
                        const cos = this.rope.cos[pos * (headDim / 2) + i];
                        const sin = this.rope.sin[pos * (headDim / 2) + i];
                        
                        const idx1 = offset + i;
                        const idx2 = offset + headDim / 2 + i;
                        
                        const v1 = K[idx1];
                        const v2 = K[idx2];
                        
                        K[idx1] = v1 * cos - v2 * sin;
                        K[idx2] = v1 * sin + v2 * cos;
                    }
                }
            }
            
            // Store K, V in cache
            for (let s = 0; s < seqLen; s++) {
                const pos = startPos + s;
                for (let h = 0; h < numKVHeads; h++) {
                    for (let d = 0; d < headDim; d++) {
                        cache.keys[pos * numKVHeads * headDim + h * headDim + d] = K[s * numKVHeads * headDim + h * headDim + d];
                        cache.values[pos * numKVHeads * headDim + h * headDim + d] = V[s * numKVHeads * headDim + h * headDim + d];
                    }
                }
            }
            
            // Attention output
            const output = new Float32Array(seqLen * hs);
            const scale = 1.0 / Math.sqrt(headDim);
            
            for (let s = 0; s < seqLen; s++) {
                for (let h = 0; h < numHeads; h++) {
                    // Get KV heads (for GQA, multiple Q heads share same KV head)
                    const kvHeadIdx = Math.floor(h * numKVHeads / numHeads);
                    
                    // Compute attention scores
                    const scores = new Float32Array(startPos + seqLen);
                    
                    for (let t = 0; t < startPos + seqLen; t++) {
                        let dot = 0;
                        for (let d = 0; d < headDim; d++) {
                            const qVal = Q[s * numHeads * headDim + h * headDim + d];
                            const kVal = cache.keys[t * numKVHeads * headDim + kvHeadIdx * headDim + d];
                            dot += qVal * kVal;
                        }
                        scores[t] = dot * scale;
                    }
                    
                    // Softmax
                    const maxScore = Math.max(...scores);
                    let sumExp = 0;
                    for (let t = 0; t < startPos + seqLen; t++) {
                        scores[t] = Math.exp(scores[t] - maxScore);
                        sumExp += scores[t];
                    }
                    for (let t = 0; t < startPos + seqLen; t++) {
                        scores[t] /= sumExp;
                    }
                    
                    // Weighted sum of values
                    for (let d = 0; d < headDim; d++) {
                        let weightedSum = 0;
                        for (let t = 0; t < startPos + seqLen; t++) {
                            weightedSum += scores[t] * cache.values[t * numKVHeads * headDim + kvHeadIdx * headDim + d];
                        }
                        output[s * hs + h * headDim + d] = weightedSum;
                    }
                }
            }
            
            // Output projection
            const result = new Float32Array(seqLen * hs);
            for (let s = 0; s < seqLen; s++) {
                for (let j = 0; j < hs; j++) {
                    let sum = 0;
                    for (let k = 0; k < hs; k++) {
                        sum += output[s * hs + k] * layer.oProj.data[k * hs + j];
                    }
                    result[s * hs + j] = sum;
                }
            }
            
            return result;
        }
        
        mlpForward(x, layer) {
            const hs = this.hiddenSize;
            const intermediate = this.intermediateSize;
            const seqLen = x.length / hs;
            
            const result = new Float32Array(seqLen * hs);
            
            for (let s = 0; s < seqLen; s++) {
                // Gate projection + SiLU
                const gate = new Float32Array(intermediate);
                for (let i = 0; i < intermediate; i++) {
                    let sum = 0;
                    for (let j = 0; j < hs; j++) {
                        sum += x[s * hs + j] * layer.gateProj.data[j * intermediate + i];
                    }
                    // SiLU activation
                    gate[i] = sum / (1 + Math.exp(-sum));
                }
                
                // Up projection
                const up = new Float32Array(intermediate);
                for (let i = 0; i < intermediate; i++) {
                    let sum = 0;
                    for (let j = 0; j < hs; j++) {
                        sum += x[s * hs + j] * layer.upProj.data[j * intermediate + i];
                    }
                    up[i] = sum;
                }
                
                // Element-wise multiply (SwiGLU)
                const activated = new Float32Array(intermediate);
                for (let i = 0; i < intermediate; i++) {
                    activated[i] = gate[i] * up[i];
                }
                
                // Down projection
                for (let j = 0; j < hs; j++) {
                    let sum = 0;
                    for (let i = 0; i < intermediate; i++) {
                        sum += activated[i] * layer.downProj.data[i * hs + j];
                    }
                    result[s * hs + j] = sum;
                }
            }
            
            return result;
        }
        
        generate(maxTokens = 50, temperature = 0.8) {
            const tokens = [];
            
            for (let i = 0; i < maxTokens; i++) {
                const logits = this.forward(tokens.length > 0 ? [tokens[tokens.length - 1]] : [this.tokenizer.bosTokenId]);
                
                // Sample from logits
                const nextToken = this.sampleLogits(logits, temperature);
                
                if (nextToken === this.tokenizer.eosTokenId) {
                    break;
                }
                
                tokens.push(nextToken);
            }
            
            return tokens;
        }
        
        sampleLogits(logits, temperature) {
            // Apply temperature
            const scaled = new Float32Array(logits.length);
            let maxLogit = -Infinity;
            
            for (let i = 0; i < logits.length; i++) {
                scaled[i] = logits[i] / temperature;
                if (scaled[i] > maxLogit) maxLogit = scaled[i];
            }
            
            // Softmax
            let sumExp = 0;
            for (let i = 0; i < scaled.length; i++) {
                scaled[i] = Math.exp(scaled[i] - maxLogit);
                sumExp += scaled[i];
            }
            for (let i = 0; i < scaled.length; i++) {
                scaled[i] /= sumExp;
            }
            
            // Sample from distribution
            const rand = Math.random();
            let cumSum = 0;
            for (let i = 0; i < scaled.length; i++) {
                cumSum += scaled[i];
                if (cumSum >= rand) {
                    return i;
                }
            }
            
            return scaled.length - 1;
        }
    }
    
    // ========================================
    // UI AND APPLICATION LOGIC
    // ========================================
    
    let model = null;
    let conversationHistory = [];
    
    function setStatus(message, isLoading = false) {
        const statusBar = document.getElementById('statusBar');
        if (isLoading) {
            statusBar.innerHTML = `<span class="loading"></span> ${message}`;
        } else {
            statusBar.textContent = message;
        }
    }
    
    function addMessage(content, role) {
        const messagesDiv = document.getElementById('messages');
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role}`;
        messageDiv.textContent = content;
        messagesDiv.appendChild(messageDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        const uploadStatus = document.getElementById('uploadStatus');
        uploadStatus.innerHTML = `<div class="loading"></div> Loading model...`;
        
        const reader = new FileReader();
        
        reader.onprogress = (e) => {
            if (e.lengthComputable) {
                const percent = Math.round((e.loaded / e.total) * 100);
                uploadStatus.innerHTML = `<div class="loading"></div> Loading model... ${percent}%`;
            }
        };
        
        reader.onload = (e) => {
            try {
                const modelData = JSON.parse(e.target.result);
                initializeModel(modelData);
            } catch (err) {
                uploadStatus.innerHTML = `Error: ${err.message}`;
                console.error(err);
            }
        };
        
        reader.onerror = () => {
            uploadStatus.innerHTML = 'Error reading file';
        };
        
        reader.readAsText(file);
    }
    
    function initializeModel(modelData) {
        setStatus('Initializing model...', true);
        
        // Use setTimeout to allow UI to update
        setTimeout(() => {
            try {
                model = new TransformerModel(modelData);
                
                // Show model info
                const modelInfo = document.getElementById('modelInfo');
                modelInfo.innerHTML = `
                    Model: ${model.config.model_type || 'Unknown'} | 
                    Layers: ${model.numLayers} | 
                    Hidden: ${model.hiddenSize} | 
                    Heads: ${model.numHeads} |
                    Vocab: ${model.vocabSize}
                    ${model.config._downscaled ? '<br><em>(Downscaled for browser)</em>' : ''}
                `;
                
                // Switch to chat view
                document.getElementById('uploadSection').style.display = 'none';
                document.getElementById('chatSection').classList.add('active');
                document.getElementById('userInput').disabled = false;
                document.getElementById('sendBtn').disabled = false;
                
                setStatus('Ready');
                addMessage('Model loaded! How can I help?', 'assistant');
                
            } catch (err) {
                setStatus('Error loading model');
                document.getElementById('uploadStatus').innerHTML = `Error: ${err.message}`;
                console.error(err);
            }
        }, 100);
    }
    
    async function sendMessage() {
        const input = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const text = input.value.trim();
        
        if (!text || !model) return;
        
        // Add user message
        addMessage(text, 'user');
        conversationHistory.push({ role: 'user', content: text });
        
        // Clear input
        input.value = '';
        input.disabled = true;
        sendBtn.disabled = true;
        
        setStatus('Generating...', true);
        
        // Tokenize input
        const inputTokens = model.tokenizer.encode(text);
        
        // Reset model state for new generation
        model.reset();
        
        // Generate response
        const responseTokens = [];
        let responseText = '';
        
        try {
            // Generate tokens one at a time for streaming effect
            const maxTokens = 100;
            
            for (let i = 0; i < maxTokens; i++) {
                const tokensToFeed = i === 0 ? inputTokens : [responseTokens[responseTokens.length - 1]];
                const logits = model.forward(tokensToFeed);
                const nextToken = model.sampleLogits(logits, 0.8);
                
                if (nextToken === model.tokenizer.eosTokenId) {
                    break;
                }
                
                responseTokens.push(nextToken);
                
                // Decode and display incrementally
                const newText = model.tokenizer.decode(responseTokens);
                
                // Update display
                if (newText !== responseText) {
                    responseText = newText;
                    
                    // Update or create assistant message
                    let assistantMsg = document.querySelector('.message.assistant:last-child');
                    if (!assistantMsg || assistantMsg.dataset.streaming !== 'true') {
                        assistantMsg = document.createElement('div');
                        assistantMsg.className = 'message assistant';
                        assistantMsg.dataset.streaming = 'true';
                        document.getElementById('messages').appendChild(assistantMsg);
                    }
                    assistantMsg.textContent = responseText;
                    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
                    
                    // Allow UI to update
                    await new Promise(resolve => setTimeout(resolve, 10));
                }
            }
            
            // Finalize
            const assistantMsg = document.querySelector('.message.assistant:last-child');
            if (assistantMsg) {
                delete assistantMsg.dataset.streaming;
            }
            
            conversationHistory.push({ role: 'assistant', content: responseText });
            setStatus('Ready');
            
        } catch (err) {
            console.error(err);
            addMessage(`Error: ${err.message}`, 'error');
            setStatus('Error occurred');
        }
        
        input.disabled = false;
        sendBtn.disabled = false;
        input.focus();
    }
    
    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }
    </script>
